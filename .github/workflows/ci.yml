name: RoadBuddy CI Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi httpx starlette anyio pydantic
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      # This creates the missing static folder and runs the tests with your env variables
      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test.db"
          SECRET_KEY: "github_actions_dummy_secret_key_for_testing"
        run: |
          mkdir -p static
          export PYTHONPATH=backend
          python -m pytest backend/ -v